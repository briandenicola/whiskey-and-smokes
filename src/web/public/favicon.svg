<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="whiskey" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e8a020"/>
      <stop offset="100%" stop-color="#b5651d"/>
    </linearGradient>
    <linearGradient id="glass" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.05"/>
    </linearGradient>
    <linearGradient id="ice" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.7"/>
      <stop offset="50%" stop-color="#d0e8f0" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#a0c4d0" stop-opacity="0.3"/>
    </linearGradient>
    <filter id="smoke-blur">
      <feGaussianBlur stdDeviation="7"/>
    </filter>
    <filter id="smoke-blur-lg">
      <feGaussianBlur stdDeviation="12"/>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="18" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Solid black background -->
  <rect width="512" height="512" rx="96" fill="#000000"/>

  <!-- Ambient glow from whiskey -->
  <ellipse cx="256" cy="340" rx="130" ry="80" fill="#e8a020" opacity="0.1" filter="url(#smoke-blur-lg)"/>

  <!-- === Rocks Glass (scaled up ~30%) === -->
  <!-- Glass body -->
  <path d="M132 180 L155 430 Q162 455 188 460 L324 460 Q350 455 357 430 L380 180 Z"
        fill="url(#glass)" stroke="#ffffff" stroke-opacity="0.3" stroke-width="2"/>

  <!-- Glass bottom -->
  <path d="M162 448 Q168 468 194 470 L318 470 Q344 468 350 448"
        fill="none" stroke="#ffffff" stroke-opacity="0.2" stroke-width="1.5"/>

  <!-- Whiskey fill -->
  <path d="M145 280 Q148 286 165 292 Q256 310 347 292 Q364 286 367 280 L357 430 Q350 455 324 460 L188 460 Q162 455 155 430 Z"
        fill="url(#whiskey)" opacity="0.85"/>

  <!-- Whiskey surface -->
  <ellipse cx="256" cy="284" rx="110" ry="16" fill="#daa520" opacity="0.6"/>

  <!-- Ice cube 1 -->
  <g transform="rotate(-8 230 262)">
    <rect x="198" y="240" width="56" height="50" rx="8" fill="url(#ice)" stroke="#ffffff" stroke-opacity="0.3" stroke-width="1.5"/>
    <line x1="210" y1="246" x2="224" y2="258" stroke="#ffffff" stroke-opacity="0.25" stroke-width="2" stroke-linecap="round"/>
    <line x1="232" y1="266" x2="243" y2="274" stroke="#ffffff" stroke-opacity="0.15" stroke-width="1.5" stroke-linecap="round"/>
  </g>

  <!-- Ice cube 2 -->
  <g transform="rotate(15 298 258)">
    <rect x="270" y="244" width="46" height="40" rx="7" fill="url(#ice)" stroke="#ffffff" stroke-opacity="0.25" stroke-width="1.5"/>
    <line x1="280" y1="250" x2="290" y2="262" stroke="#ffffff" stroke-opacity="0.2" stroke-width="1.5" stroke-linecap="round"/>
  </g>

  <!-- Glass left highlight -->
  <path d="M140 192 Q145 310 158 428" stroke="#ffffff" stroke-opacity="0.15" stroke-width="4" fill="none" stroke-linecap="round"/>

  <!-- === Orange Peel Garnish === -->
  <path d="M310 225 Q336 206 362 218 Q374 224 368 238 Q356 244 336 234"
        fill="#e87020" opacity="0.9" stroke="#c45e18" stroke-width="1.5"/>
  <path d="M316 228 Q336 214 358 224" fill="none" stroke="#f0a050" stroke-opacity="0.5" stroke-width="1.5"/>

  <!-- === Smoke Wisps === -->
  <path d="M240 218 Q226 166 246 128 Q264 92 244 48 Q234 26 246 4"
        fill="none" stroke="#c8b8a0" stroke-opacity="0.35" stroke-width="5"
        stroke-linecap="round" filter="url(#smoke-blur)"/>

  <path d="M218 224 Q198 180 212 142 Q230 98 206 60 Q194 36 204 14"
        fill="none" stroke="#b8a890" stroke-opacity="0.25" stroke-width="4.5"
        stroke-linecap="round" filter="url(#smoke-blur)"/>

  <path d="M272 214 Q292 162 278 124 Q260 86 286 52 Q298 30 288 8"
        fill="none" stroke="#c0b098" stroke-opacity="0.3" stroke-width="4"
        stroke-linecap="round" filter="url(#smoke-blur)"/>

  <path d="M326 205 Q338 168 326 136 Q312 104 334 68"
        fill="none" stroke="#b0a090" stroke-opacity="0.18" stroke-width="3"
        stroke-linecap="round" filter="url(#smoke-blur)"/>

  <path d="M220 60 Q256 42 290 56" fill="none" stroke="#c8b8a0" stroke-opacity="0.12"
        stroke-width="10" stroke-linecap="round" filter="url(#smoke-blur-lg)"/>
</svg>