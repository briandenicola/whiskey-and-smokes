version: "3"

vars:
  TITLE: Whiskey & Smokes
  API_DIR: ./src/api
  WEB_DIR: ./src/web
  APPHOST_DIR: ./src/AppHost
  SLN: ./src/WhiskeyAndSmokes.sln

tasks:
  default:
    cmds:
      - task --list

  build:
    desc: Builds the full solution (API, AppHost, ServiceDefaults, AgentInitiator) and Vue frontend
    cmds:
      - dotnet build {{.SLN}}
      - task: build:web

  build:web:
    desc: Builds the Vue frontend
    dir: "{{.WEB_DIR}}"
    cmds:
      - npm ci
      - npm run build

  run:
    desc: Runs Aspire AppHost (API with dashboard) and Vue frontend
    deps:
      - services:up
      - apphost
      - web

  apphost:
    desc: Runs the Aspire AppHost (orchestrates API with OpenTelemetry dashboard)
    dir: "{{.APPHOST_DIR}}"
    env:
      AiFoundry__Endpoint: "{{.FOUNDRY_ENDPOINT}}"
      AiFoundry__ProjectEndpoint: "{{.PROJECT_ENDPOINT}}"
      AiFoundry__Models__Vision: gpt-4o
      AiFoundry__Models__Reasoning: gpt-5-mini
      APPLICATIONINSIGHTS_CONNECTION_STRING: "{{.APPINSIGHTS_CONN}}"
      ASPIRE_DASHBOARD_OTLP_HTTP_ENDPOINT_URL: http://localhost:18889
      ASPIRE_ALLOW_UNSECURED_TRANSPORT: "true"
      # Trust proxy/corporate root CAs for local dev (TLS inspection)
      SSL_CERT_DIR: /etc/ssl/certs
    cmds:
      - dotnet run
    vars:
      FOUNDRY_ENDPOINT:
        sh: terraform -chdir=./infrastructure/local output -raw OPENAI_ENDPOINT 2>/dev/null || echo ""
      PROJECT_ENDPOINT:
        sh: terraform -chdir=./infrastructure/local output -raw FOUNDRY_PROJECT_ENDPOINT 2>/dev/null || echo ""
      APPINSIGHTS_CONN:
        sh: terraform -chdir=./infrastructure/local output -raw APPLICATION_INSIGHTS_CONNECTION_STRING 2>/dev/null || echo ""

  api:
    desc: Runs the .NET API standalone (without Aspire)
    dir: "{{.API_DIR}}"
    env:
      AiFoundry__Endpoint: "{{.FOUNDRY_ENDPOINT}}"
      AiFoundry__ProjectEndpoint: "{{.PROJECT_ENDPOINT}}"
      AiFoundry__Models__Vision: gpt-4o
      AiFoundry__Models__Reasoning: gpt-5-mini
      APPLICATIONINSIGHTS_CONNECTION_STRING: "{{.APPINSIGHTS_CONN}}"
      # Trust proxy/corporate root CAs for local dev (TLS inspection)
      SSL_CERT_DIR: /etc/ssl/certs
    cmds:
      - dotnet run
    vars:
      FOUNDRY_ENDPOINT:
        sh: terraform -chdir=./infrastructure/local output -raw OPENAI_ENDPOINT 2>/dev/null || echo ""
      PROJECT_ENDPOINT:
        sh: terraform -chdir=./infrastructure/local output -raw FOUNDRY_PROJECT_ENDPOINT 2>/dev/null || echo ""
      APPINSIGHTS_CONN:
        sh: terraform -chdir=./infrastructure/local output -raw APPLICATION_INSIGHTS_CONNECTION_STRING 2>/dev/null || echo ""

  web:
    desc: Runs the Vue frontend dev server
    dir: "{{.WEB_DIR}}"
    cmds:
      - npm install --silent
      - npm run dev

  agent:init:
    desc: Validates agent configuration against AI Foundry
    env:
      AiFoundry__ProjectEndpoint: "{{.PROJECT_ENDPOINT}}"
    cmds:
      - dotnet run --project ./src/AgentInitiator
    vars:
      PROJECT_ENDPOINT:
        sh: terraform -chdir=./infrastructure/local output -raw FOUNDRY_PROJECT_ENDPOINT 2>/dev/null || echo ""

  services:up:
    desc: Starts all services via Docker Compose
    dir: ./tasks
    cmds:
      - docker compose up -d

  services:down:
    desc: Stops all Docker Compose services
    dir: ./tasks
    cmds:
      - docker compose down

  services:logs:
    desc: Tails Docker Compose logs
    dir: ./tasks
    cmds:
      - docker compose logs -f