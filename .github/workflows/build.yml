name: Build

on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '*.md'
      - 'infrastructure/**'
      - 'tasks/**'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - prod

permissions:
  id-token: write
  contents: read

jobs:
  build:
    name: Build & Push Images
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'dev' }}
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Build API Image (ACR Build Task)
        run: |
          az acr build \
            --registry ${{ vars.ACR_NAME }} \
            --image whiskey-and-smokes-api:${{ github.sha }} \
            --image whiskey-and-smokes-api:latest \
            --file src/api/Dockerfile \
            src

      - name: Build Web Image (ACR Build Task)
        run: |
          az acr build \
            --registry ${{ vars.ACR_NAME }} \
            --image whiskey-and-smokes-web:${{ github.sha }} \
            --image whiskey-and-smokes-web:latest \
            --file src/web/Dockerfile \
            src/web
