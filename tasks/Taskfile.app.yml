version: "3"

vars:
  TITLE: SipPuff
  API_DIR: ./src/api
  WEB_DIR: ./src/web
  APPHOST_DIR: ./src/AppHost
  SLN: ./src/SipPuff.sln

tasks:
  default:
    cmds:
      - task --list

  build:
    desc: Builds the full solution (API, AppHost, ServiceDefaults)
    cmds:
      - dotnet build {{.SLN}}

  build:web:
    desc: Builds the Vue frontend
    dir: "{{.WEB_DIR}}"
    cmds:
      - npm ci
      - npm run build

  run:
    desc: Runs Aspire AppHost (API with dashboard) and Vue frontend
    deps:
      - run:apphost
      - run:web

  run:apphost:
    desc: Runs the Aspire AppHost (orchestrates API with OpenTelemetry dashboard)
    dir: "{{.APPHOST_DIR}}"
    cmds:
      - AiFoundry__Endpoint={{.FOUNDRY_ENDPOINT}} dotnet run
    vars:
      FOUNDRY_ENDPOINT:
        sh: terraform -chdir=./infrastructure/local output -raw OPENAI_ENDPOINT 2>/dev/null || echo ""

  run:api:
    desc: Runs the .NET API standalone (without Aspire)
    dir: "{{.API_DIR}}"
    cmds:
      - dotnet restore --quiet
      - AiFoundry__Endpoint={{.FOUNDRY_ENDPOINT}} dotnet run
    vars:
      FOUNDRY_ENDPOINT:
        sh: terraform -chdir=./infrastructure/local output -raw OPENAI_ENDPOINT 2>/dev/null || echo ""

  run:web:
    desc: Runs the Vue frontend dev server
    dir: "{{.WEB_DIR}}"
    cmds:
      - npm install --silent
      - npm run dev

  test:
    desc: Runs all tests
    cmds:
      - task: test:api
      - task: test:web

  test:api:
    desc: Runs .NET API tests
    dir: "{{.API_DIR}}"
    cmds:
      - dotnet test || echo "No test projects found"

  test:web:
    desc: Runs Vue frontend type check
    dir: "{{.WEB_DIR}}"
    cmds:
      - npx vue-tsc --noEmit

  docker:up:
    desc: Starts all services via Docker Compose
    dir: ./tasks
    cmds:
      - docker compose up -d --build

  docker:down:
    desc: Stops all Docker Compose services
    dir: ./tasks
    cmds:
      - docker compose down

  docker:logs:
    desc: Tails Docker Compose logs
    dir: ./tasks
    cmds:
      - docker compose logs -f