name: Infrastructure

on:
  push:
    branches: [main]
    paths:
      - 'infrastructure/azure/**'
      - 'infrastructure/app/**'
  workflow_dispatch:
    inputs:
      action:
        description: 'Terraform action'
        required: true
        default: 'plan'
        type: choice
        options:
          - plan
          - apply
          - destroy
      stack:
        description: 'Which stack to run'
        required: true
        default: 'azure'
        type: choice
        options:
          - azure
          - app

permissions:
  id-token: write
  contents: read

env:
  TF_VERSION: '1.12'
  ARM_USE_OIDC: true

jobs:
  terraform-azure:
    name: 'Azure Infrastructure'
    if: |
      github.event.inputs.stack == 'azure' ||
      github.event.inputs.stack == '' ||
      (github.event_name == 'push' && github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest
    environment: dev
    defaults:
      run:
        working-directory: infrastructure/azure
    env:
      ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        run: terraform init

      - name: Terraform Format Check
        run: terraform fmt -check -recursive

      - name: Terraform Plan
        id: plan
        run: |
          terraform plan \
            -var="tags=${{ vars.APP_NAME || 'whiskey-and-smokes' }}" \
            -out=tfplan \
            -input=false

      - name: Terraform Apply
        if: |
          (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
          (github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'apply')
        run: terraform apply -auto-approve tfplan

      - name: Terraform Destroy
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'destroy'
        run: |
          terraform destroy \
            -var="tags=${{ vars.APP_NAME || 'whiskey-and-smokes' }}" \
            -auto-approve

  terraform-app:
    name: 'App Deployment'
    needs: terraform-azure
    if: |
      always() &&
      (github.event.inputs.stack == 'app' ||
       (github.event_name == 'push' && github.ref == 'refs/heads/main'))
    runs-on: ubuntu-latest
    environment: dev
    defaults:
      run:
        working-directory: infrastructure/app
    env:
      ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        run: terraform init

      - name: Terraform Plan
        id: plan
        run: |
          terraform plan \
            -var="app_name=${{ vars.APP_NAME }}" \
            -var="tags=${{ vars.APP_NAME || 'whiskey-and-smokes' }}" \
            -var="commit_version=${{ github.sha }}" \
            -var="cosmosdb_endpoint=${{ vars.COSMOSDB_ENDPOINT }}" \
            -var="storage_blob_endpoint=${{ vars.STORAGE_BLOB_ENDPOINT }}" \
            -out=tfplan \
            -input=false

      - name: Terraform Apply
        if: |
          (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
          (github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'apply')
        run: terraform apply -auto-approve tfplan

      - name: Terraform Destroy
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'destroy'
        run: |
          terraform destroy \
            -var="app_name=${{ vars.APP_NAME }}" \
            -var="tags=${{ vars.APP_NAME || 'whiskey-and-smokes' }}" \
            -var="commit_version=${{ github.sha }}" \
            -var="cosmosdb_endpoint=${{ vars.COSMOSDB_ENDPOINT }}" \
            -var="storage_blob_endpoint=${{ vars.STORAGE_BLOB_ENDPOINT }}" \
            -auto-approve
