name: Deploy

on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '*.md'
      - 'infrastructure/azure/**'
      - 'infrastructure/local/**'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - prod

permissions:
  id-token: write
  contents: read

env:
  TF_VERSION: '1.12'
  ARM_USE_OIDC: true

jobs:
  build:
    name: Build Images
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'dev' }}
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Build API Image (ACR Build Task)
        run: |
          az acr build \
            --registry ${{ vars.ACR_NAME }} \
            --image whiskey-and-smokes-api:${{ github.sha }} \
            --image whiskey-and-smokes-api:latest \
            --file src/api/Dockerfile \
            src

      - name: Build Web Image (ACR Build Task)
        run: |
          az acr build \
            --registry ${{ vars.ACR_NAME }} \
            --image whiskey-and-smokes-web:${{ github.sha }} \
            --image whiskey-and-smokes-web:latest \
            --file src/web/Dockerfile \
            src/web

  deploy:
    name: Deploy to Container Apps
    needs: build
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'dev' }}
    defaults:
      run:
        working-directory: infrastructure/app
    env:
      ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        run: terraform init

      - name: Terraform Apply
        run: |
          terraform apply -auto-approve -input=false \
            -var="app_name=${{ secrets.APP_NAME }}" \
            -var="tags=${{ secrets.APP_NAME }}" \
            -var="commit_version=${{ github.sha }}" \
            -var="cosmosdb_endpoint=${{ secrets.COSMOSDB_ENDPOINT }}" \
            -var="storage_blob_endpoint=${{ secrets.STORAGE_BLOB_ENDPOINT }}"
