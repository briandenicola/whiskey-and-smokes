<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F7E7CE"/>
      <stop offset="100%" stop-color="#E8D4B2"/>
    </linearGradient>
    <linearGradient id="martiniLiquid" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f2dc92"/>
      <stop offset="100%" stop-color="#c89828"/>
    </linearGradient>
    <clipPath id="tiramisuClip">
      <rect x="12" y="15" width="120" height="92" rx="6"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>

  <!-- Subtle decorative rings -->
  <circle cx="210" cy="245" r="180" fill="none" stroke="#b8943c" stroke-width="0.8" opacity="0.12"/>
  <circle cx="210" cy="245" r="140" fill="none" stroke="#b8943c" stroke-width="0.5" opacity="0.09"/>

  <!-- ===== MARTINI GLASS ===== -->

  <!-- Glass V-shape -->
  <path d="M 90,112 L 320,112 L 205,285"
        fill="none" stroke="#8c7a5a" stroke-width="5"
        stroke-linejoin="round" stroke-linecap="round"/>

  <!-- Liquid fill -->
  <polygon points="114,136 296,136 205,278"
           fill="url(#martiniLiquid)" opacity="0.55"/>

  <!-- Subtle glass shine -->
  <path d="M 105,125 L 115,125 L 207,278 L 203,278 Z"
        fill="#ffffff" opacity="0.18"/>

  <!-- Stem -->
  <line x1="205" y1="285" x2="205" y2="374"
        stroke="#8c7a5a" stroke-width="5" stroke-linecap="round"/>

  <!-- Base -->
  <line x1="152" y1="377" x2="258" y2="377"
        stroke="#8c7a5a" stroke-width="5" stroke-linecap="round"/>

  <!-- Olive on cocktail pick -->
  <line x1="172" y1="130" x2="238" y2="130"
        stroke="#a08030" stroke-width="3" stroke-linecap="round"/>
  <circle cx="205" cy="130" r="10" fill="#8a9e62"
          stroke="#6e8248" stroke-width="1.8"/>
  <circle cx="205" cy="130" r="3.5" fill="#c43828"/>

  <!-- Sparkle on rim -->
  <circle cx="118" cy="114" r="4" fill="#ffffff" opacity="0.6"/>
  <circle cx="295" cy="114" r="2.5" fill="#ffffff" opacity="0.35"/>

  <!-- ===== TIRAMISU SLICE ===== -->
  <g transform="translate(298,285)">
    <!-- Plate shadow -->
    <ellipse cx="72" cy="115" rx="78" ry="11"
             fill="#8a7a5a" opacity="0.15"/>

    <!-- Outer border -->
    <rect x="12" y="15" width="120" height="92" rx="6"
          fill="#f5efe4" stroke="#9a8660" stroke-width="2.5"/>

    <!-- Layers clipped to rounded rect -->
    <g clip-path="url(#tiramisuClip)">
      <!-- Bottom espresso-soaked ladyfinger -->
      <rect x="0" y="82" width="144" height="30" fill="#9a6236"/>
      <!-- Mascarpone cream -->
      <rect x="0" y="63" width="144" height="19" fill="#f2eada"/>
      <!-- Middle ladyfinger -->
      <rect x="0" y="47" width="144" height="16" fill="#885430"/>
      <!-- Top mascarpone cream -->
      <rect x="0" y="31" width="144" height="16" fill="#eee4cc"/>
      <!-- Cocoa powder dusting -->
      <rect x="0" y="8" width="144" height="25" fill="#3c2010"/>
    </g>

    <!-- Re-draw border on top of layers -->
    <rect x="12" y="15" width="120" height="92" rx="6"
          fill="none" stroke="#9a8660" stroke-width="2.5"/>
  </g>

  <!-- Subtle gold accent line -->
  <line x1="90" y1="450" x2="422" y2="450"
        stroke="#a08838" stroke-width="1" opacity="0.2"
        stroke-linecap="round"/>
</svg>